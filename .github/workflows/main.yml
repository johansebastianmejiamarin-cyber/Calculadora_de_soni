name: Build Android APK
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          
      - name: Install dependencies
        run: |
          pip install flet holidays
          
      - name: Build APK
        run: |
          # El comando --release asegura que se genere el instalador final
          flet build apk --release
          
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          # Buscamos en todo el proyecto cualquier .apk generado
          path: "**/*.apk" 
          if-no-files-found: error
